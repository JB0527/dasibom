services:
  # PostgreSQL with PostGIS
  database:
    image: postgis/postgis:16-3.4
    container_name: dasibom-db
    environment:
      POSTGRES_DB: ${DB_NAME:-dasibom}
      POSTGRES_USER: ${DB_USERNAME:-dasibom_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dasibom_password}
      TZ: Asia/Seoul
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dasibom_user} -d ${POSTGRES_DB:-dasibom}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - dasibom-network
    restart: unless-stopped

  # Redis
  redis:
    image: redis:7-alpine
    container_name: dasibom-redis
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - dasibom-network
    restart: unless-stopped

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dasibom-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-dasibom}
      DB_USERNAME: ${DB_USERNAME:-dasibom_user}
      DB_PASSWORD: ${DB_PASSWORD:-dasibom_password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_PORT: 8080
      # JVM options for production
      JAVA_OPTS: >-
        -Xms512m
        -Xmx1024m
        -XX:+UseG1GC
        -XX:G1HeapRegionSize=16m
        -XX:+UseStringDeduplication
        -Djava.security.egd=file:/dev/./urandom
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - ./logs:/app/logs
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - dasibom-network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: dasibom-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - dasibom-network
    restart: unless-stopped

networks:
  dasibom-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local