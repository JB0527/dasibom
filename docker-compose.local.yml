services:
  # PostgreSQL with PostGIS for Local Development
  database:
    image: postgis/postgis:16-3.4
    container_name: dasibom-db-local
    environment:
      POSTGRES_DB: ${DB_NAME:-dasibom_dev}
      POSTGRES_USER: ${DB_USERNAME:-dev_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password}
      TZ: Asia/Seoul
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dev_user} -d ${POSTGRES_DB:-dasibom_dev}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    networks:
      - dasibom-local-network

  # Redis for Local Development
  redis:
    image: redis:7-alpine
    container_name: dasibom-redis-local
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_local_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - dasibom-local-network

  # pgAdmin for Database Management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dasibom-pgadmin-local
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@dasibom.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_local_data:/var/lib/pgadmin
    depends_on:
      - database
    networks:
      - dasibom-local-network

  # MailHog for Email Testing
  mailhog:
    image: mailhog/mailhog:latest
    container_name: dasibom-mailhog-local
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - dasibom-local-network

networks:
  dasibom-local-network:
    driver: bridge

volumes:
  postgres_local_data:
    driver: local
  redis_local_data:
    driver: local
  pgadmin_local_data:
    driver: local