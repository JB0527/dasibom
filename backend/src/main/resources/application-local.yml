spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/dasibom
    username: dasibom_user
    password: your_secure_password_here
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.spatial.dialect.postgis.PostgisPG10Dialect

  data:
    redis:
      host: localhost
      port: 6379

# External API Configuration - 로컬 개발용
external:
  safe182:
    base-url: ${SAFE182_BASE_URL:https://www.safe182.go.kr}
    auth-key: ${SAFE182_AUTH_KEY:bca2e2d148a24ced}
    esntl-id: ${SAFE182_ESNTL_ID:10000838}
    scheduler:
      enabled: ${SAFE182_SCHEDULER_ENABLED:true}  # 스케줄러 활성화 여부
      fixed-rate: ${SAFE182_SCHEDULER_FIXED_RATE:300000}  # 스케줄링 간격 (ms) - 기본 5분
      initial-delay: ${SAFE182_SCHEDULER_INITIAL_DELAY:60000}  # 초기 지연 시간 (ms) - 기본 1분

logging:
  level:
    site.dasibom: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG